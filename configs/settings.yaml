model:
  # No-GPU option: hf-api/Qwen/Qwen2.5-7B-Instruct (uses HF free Inference API)
  # Gated local models (requires `huggingface-cli login`): meta-llama/Llama-3.1-8B-Instruct
  default: "google/gemini-2.5-flash"
  hf_cache_dir: "models"

paths:
  papers_dir: "papers"
  output_dir: "output"

evaluation:
  quality_threshold: 7
  max_paper_chars: 20000
  temperature: 0.01
  max_retries: 3

extraction:
  temperature: 0.01
  max_retries: 3

dataset:
  instruction: "Given the UAV task description and environment context below, generate the reward function as a standalone Python function."

rate_limits:
  google: 5       # Gemini free tier: 5 req/min
  openai: 60      # OpenAI tier 1: 60 req/min
  xai: 60         # xAI default
  hf-api: 30      # HF Inference API free tier
